<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoML Comparison Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        select, input[type="file"], button {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .metric-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .metric-card p {
            font-size: 24px;
            font-weight: bold;
        }
        
        .visualization {
            margin-top: 20px;
            text-align: center;
        }
        
        .visualization img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AutoML Comparison Tool</h1>
            <p>Сравнение автоматического и ручного машинного обучения</p>
        </div>
        
        <div class="card">
            <h2>📁 Загрузка данных</h2>
            <div class="form-group">
                <input type="file" id="fileInput" accept=".csv">
            </div>
            <div id="dataInfo"></div>
        </div>
        
        <div class="card">
            <h2>⚙️ Настройки</h2>
            <div class="form-group">
                <label>Целевая переменная:</label>
                <select id="targetColumn">
                    <option value="">-- Выберите колонку --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип задачи:</label>
                <select id="problemType">
                    <option value="classification">Классификация</option>
                    <option value="regression">Регрессия</option>
                </select>
            </div>
            <button onclick="setTarget()">Подтвердить настройки</button>
        </div>
        
        <div class="button-group">
            <button onclick="trainAutoML()">🚀 Обучить AutoML</button>
            <button onclick="trainManual()">🔧 Обучить вручную</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Обучение модели...</p>
        </div>
        
        <div id="automlResults" class="card" style="display:none;">
            <h2>🤖 Результаты AutoML</h2>
            <div id="automlContent"></div>
        </div>
        
        <div id="manualResults" class="card" style="display:none;">
            <h2>🔧 Результаты ручного обучения</h2>
            <div id="manualContent"></div>
        </div>
        
        <div id="comparison" class="card" style="display:none;">
            <h2>📊 Сравнение результатов</h2>
            <div id="comparisonContent"></div>
        </div>
    </div>
    
    <script>
        let targetSet = false;
        let automlResults = null;
        let manualResults = null;
        
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            showLoading();
            
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            hideLoading();
            
            if (data.columns) {
                const select = document.getElementById('targetColumn');
                select.innerHTML = '<option value="">-- Выберите колонку --</option>';
                data.columns.forEach(col => {
                    select.innerHTML += `<option value="${col}">${col}</option>`;
                });
                
                document.getElementById('dataInfo').innerHTML = `
                    <div class="alert alert-success">
                        ✅ Данные загружены: ${data.shape[0]} строк, ${data.shape[1]} колонок
                    </div>
                `;
            }
        });
        
        async function setTarget() {
            const target = document.getElementById('targetColumn').value;
            const problem = document.getElementById('problemType').value;
            
            if (!target) {
                alert('Выберите целевую переменную');
                return;
            }
            
            const formData = new FormData();
            formData.append('target', target);
            formData.append('problem', problem);
            
            const response = await fetch('/set_target', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            targetSet = true;
            
            document.getElementById('dataInfo').innerHTML += `
                <div class="alert alert-success">
                    🎯 Целевая переменная: ${data.target}<br>
                    📈 Тип задачи: ${data.problem === 'classification' ? 'Классификация' : 'Регрессия'}
                </div>
            `;
        }
        
        async function trainAutoML() {
            if (!targetSet) {
                alert('Сначала настройте целевую переменную');
                return;
            }
            
            showLoading();
            
            const response = await fetch('/train_automl', {
                method: 'POST'
            });
            
            const data = await response.json();
            hideLoading();
            
            if (data.error) {
                alert('Ошибка: ' + data.error);
                return;
            }
            
            automlResults = data;
            displayAutoMLResults(data);
            
            if (manualResults) {
                displayComparison();
            }
        }
        
        async function trainManual() {
            if (!targetSet) {
                alert('Сначала настройте целевую переменную');
                return;
            }
            
            showLoading();
            
            const response = await fetch('/train_manual', {
                method: 'POST'
            });
            
            const data = await response.json();
            hideLoading();
            
            if (data.error) {
                alert('Ошибка: ' + data.error);
                return;
            }
            
            manualResults = data;
            displayManualResults(data);
            
            if (automlResults) {
                displayComparison();
            }
        }
        
        function displayAutoMLResults(data) {
            const container = document.getElementById('automlContent');
            const problem = document.getElementById('problemType').value;
            
            let tableHtml = '<table><thead><tr>';
            if (problem === 'classification') {
                tableHtml += '<th>Модель</th><th>Accuracy</th><th>AUC</th><th>Recall</th><th>Precision</th><th>F1</th>';
            } else {
                tableHtml += '<th>Модель</th><th>MAE</th><th>MSE</th><th>RMSE</th><th>R2</th>';
            }
            tableHtml += '</tr></thead><tbody>';
            
            data.models.forEach(model => {
                tableHtml += '<tr>';
                tableHtml += `<td>${model.model}</td>`;
                if (problem === 'classification') {
                    tableHtml += `<td>${(model.accuracy * 100).toFixed(2)}%</td>`;
                    tableHtml += `<td>${(model.auc * 100).toFixed(2)}%</td>`;
                    tableHtml += `<td>${(model.recall * 100).toFixed(2)}%</td>`;
                    tableHtml += `<td>${(model.precision * 100).toFixed(2)}%</td>`;
                    tableHtml += `<td>${(model.f1 * 100).toFixed(2)}%</td>`;
                } else {
                    tableHtml += `<td>${model.mae.toFixed(4)}</td>`;
                    tableHtml += `<td>${model.mse.toFixed(4)}</td>`;
                    tableHtml += `<td>${model.rmse.toFixed(4)}</td>`;
                    tableHtml += `<td>${model.r2.toFixed(4)}</td>`;
                }
                tableHtml += '</tr>';
            });
            tableHtml += '</tbody></table>';
            
            let metricsHtml = '<div class="metrics">';
            if (problem === 'classification') {
                metricsHtml += `
                    <div class="metric-card">
                        <h3>Лучшая модель</h3>
                        <p>${data.models[0].model}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучшая точность</h3>
                        <p>${(data.results.best_model_accuracy * 100).toFixed(2)}%</p>
                    </div>
                `;
            } else {
                metricsHtml += `
                    <div class="metric-card">
                        <h3>Лучшая модель</h3>
                        <p>${data.models[0].model}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучший RMSE</h3>
                        <p>${data.results.best_model_rmse.toFixed(4)}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучший R²</h3>
                        <p>${data.results.best_model_r2.toFixed(4)}</p>
                    </div>
                `;
            }
            metricsHtml += '</div>';
            
            let vizHtml = '';
            if (data.visualization) {
                vizHtml = `<div class="visualization">
                    <h3>Визуализация результатов</h3>
                    <img src="data:image/png;base64,${data.visualization}" alt="AutoML Results">
                </div>`;
            }
            
            container.innerHTML = metricsHtml + tableHtml + vizHtml;
            document.getElementById('automlResults').style.display = 'block';
        }
        
        function displayManualResults(data) {
            const container = document.getElementById('manualContent');
            const problem = document.getElementById('problemType').value;
            
            let tableHtml = '<table><thead><tr>';
            if (problem === 'classification') {
                tableHtml += '<th>Модель</th><th>Accuracy</th>';
            } else {
                tableHtml += '<th>Модель</th><th>RMSE</th><th>R²</th>';
            }
            tableHtml += '</tr></thead><tbody>';
            
            data.models.forEach(model => {
                tableHtml += '<tr>';
                tableHtml += `<td>${model.model}</td>`;
                if (problem === 'classification') {
                    tableHtml += `<td>${(model.accuracy * 100).toFixed(2)}%</td>`;
                } else {
                    tableHtml += `<td>${model.rmse.toFixed(4)}</td>`;
                    tableHtml += `<td>${model.r2.toFixed(4)}</td>`;
                }
                tableHtml += '</tr>';
            });
            tableHtml += '</tbody></table>';
            
            let metricsHtml = '<div class="metrics">';
            if (problem === 'classification') {
                const bestModel = data.models.reduce((best, m) => m.accuracy > best.accuracy ? m : best, data.models[0]);
                metricsHtml += `
                    <div class="metric-card">
                        <h3>Лучшая модель</h3>
                        <p>${bestModel.model}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучшая точность</h3>
                        <p>${(data.results.best_accuracy * 100).toFixed(2)}%</p>
                    </div>
                `;
            } else {
                const bestModel = data.models.reduce((best, m) => m.rmse < best.rmse ? m : best, data.models[0]);
                metricsHtml += `
                    <div class="metric-card">
                        <h3>Лучшая модель</h3>
                        <p>${bestModel.model}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучший RMSE</h3>
                        <p>${data.results.best_rmse.toFixed(4)}</p>
                    </div>
                    <div class="metric-card">
                        <h3>Лучший R²</h3>
                        <p>${data.results.best_r2.toFixed(4)}</p>
                    </div>
                `;
            }
            metricsHtml += '</div>';
            
            let vizHtml = '';
            if (data.visualization) {
                vizHtml = `<div class="visualization">
                    <h3>Визуализация результатов</h3>
                    <img src="data:image/png;base64,${data.visualization}" alt="Manual Results">
                </div>`;
            }
            
            container.innerHTML = metricsHtml + tableHtml + vizHtml;
            document.getElementById('manualResults').style.display = 'block';
        }
        
        function displayComparison() {
            const container = document.getElementById('comparisonContent');
            const problem = document.getElementById('problemType').value;
            
            let automlBest = automlResults.models[0];
            let manualBest = manualResults.models.reduce((best, m) => {
                if (problem === 'classification') {
                    return m.accuracy > best.accuracy ? m : best;
                } else {
                    return m.rmse < best.rmse ? m : best;
                }
            }, manualResults.models[0]);
            
            let comparisonHtml = '<div class="comparison">';
            
            comparisonHtml += '<div>';
            comparisonHtml += '<h3>🤖 AutoML</h3>';
            comparisonHtml += `<p><strong>Лучшая модель:</strong> ${automlBest.model}</p>`;
            if (problem === 'classification') {
                comparisonHtml += `<p><strong>Точность:</strong> ${(automlBest.accuracy * 100).toFixed(2)}%</p>`;
            } else {
                comparisonHtml += `<p><strong>RMSE:</strong> ${automlBest.rmse.toFixed(4)}</p>`;
                comparisonHtml += `<p><strong>R²:</strong> ${automlBest.r2.toFixed(4)}</p>`;
            }
            comparisonHtml += '</div>';
            
            comparisonHtml += '<div>';
            comparisonHtml += '<h3>🔧 Ручное обучение</h3>';
            comparisonHtml += `<p><strong>Лучшая модель:</strong> ${manualBest.model}</p>`;
            if (problem === 'classification') {
                comparisonHtml += `<p><strong>Точность:</strong> ${(manualBest.accuracy * 100).toFixed(2)}%</p>`;
            } else {
                comparisonHtml += `<p><strong>RMSE:</strong> ${manualBest.rmse.toFixed(4)}</p>`;
                comparisonHtml += `<p><strong>R²:</strong> ${manualBest.r2.toFixed(4)}</p>`;
            }
            comparisonHtml += '</div>';
            
            comparisonHtml += '</div>';
            
            let verdict = '';
            if (problem === 'classification') {
                const diff = automlBest.accuracy - manualBest.accuracy;
                if (diff > 0) {
                    verdict = `<div class="alert alert-success">✅ AutoML показал результат на ${(diff * 100).toFixed(2)}% лучше ручного обучения</div>`;
                } else if (diff < 0) {
                    verdict = `<div class="alert alert-success">✅ Ручное обучение показало результат на ${(Math.abs(diff) * 100).toFixed(2)}% лучше AutoML</div>`;
                } else {
                    verdict = '<div class="alert">⚖️ Результаты равны</div>';
                }
            } else {
                const diff = manualBest.rmse - automlBest.rmse;
                if (diff > 0) {
                    verdict = `<div class="alert alert-success">✅ AutoML показал результат на ${diff.toFixed(4)} (RMSE) лучше ручного обучения</div>`;
                } else if (diff < 0) {
                    verdict = `<div class="alert alert-success">✅ Ручное обучение показало результат на ${Math.abs(diff).toFixed(4)} (RMSE) лучше AutoML</div>`;
                } else {
                    verdict = '<div class="alert">⚖️ Результаты равны</div>';
                }
            }
            
            container.innerHTML = comparisonHtml + verdict;
            document.getElementById('comparison').style.display = 'block';
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
